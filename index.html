<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauti Rose</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: #fff5f7;
        }

        /* ENCABEZADO */
        header{
            width: 100%;
            height: 90px;
            background: #ffb6c1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .logo{
            font-size: 35px;
            font-weight: bold;
            color: white;
            letter-spacing: 2px;
        }

        nav a{
            text-decoration: none;
            color: white;
            margin-left: 25px;
            font-size: 18px;
            transition: 0.3s;
        }

        nav a:hover{
            color: #ffe4ec;
        }

        /* PRESENTACION */
        .presentacion{
            width: 100%;
            height: calc(100vh - 90px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
            gap: 50px;
        }

        .texto{
            width: 50%;
        }

        .texto h1{
            font-size: 65px;
            color: #d63384;
            margin-bottom: 20px;
        }

        .texto p{
            font-size: 20px;
            color: #555;
            line-height: 1.7;
            margin-bottom: 30px;
        }

        .boton{
            display: inline-block;
            padding: 15px 35px;
            background: #ff69b4;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 18px;
            transition: 0.3s;
        }

        .boton:hover{
            background: #d63384;
            transform: scale(1.05);
        }

        .imagen{
            width: 40%;
            display: flex;
            justify-content: center;
        }

        .imagen img{
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* RESPONSIVE */
        @media(max-width: 900px){

            .presentacion{
                flex-direction: column;
                text-align: center;
            }

            .texto{
                width: 100%;
            }

            .imagen{
                width: 100%;
            }

            .texto h1{
                font-size: 45px;
            }
        }
        /* LOGO */

.logo-contenedor{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo-img{
    width:70px;
    height:70px;
    object-fit:contain;
    border-radius:50%;
    background:white;
    padding:5px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.logo-texto{
    color:white;
    font-size:32px;
    font-weight:bold;
}
    </style>
</head>
<body>

    <header>
        <div class="logo-contenedor">

    <img src="imagenes/logo.png" alt="Logo Beauti Rose" class="logo-img">

    <div class="logo-texto">Beauti Rose</div>

</div>
       
    </header>

    <section class="presentacion">

        <div class="texto">
            <h1>Resalta tu Belleza</h1>

            <p>
                Bienvenida a Beauti Rose, tu espacio ideal para descubrir
                maquillaje elegante, moderno y lleno de estilo. Encuentra
                los mejores productos para realzar tu belleza y sentirte
                increíble todos los días.
            </p>

            <a href="vista2.html" class="boton">Ver Productos</a>
        </div>


        <div class="imagen">
            <img src="imagenes/GuiadeAutoMaquillaje.webp" alt="Maquillaje">
        </div>

    </section>

</body>
</html>
